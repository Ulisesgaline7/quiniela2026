# fly.toml — Quiniela FIFA World Cup 2026
app = "quiniela2026"
primary_region = "mia"  # Miami — closest to LATAM

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV      = "production"
  APP_DEBUG    = "false"
  DB_CONNECTION = "sqlite"
  DB_DATABASE  = "/var/www/html/database/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE  = "file"
  LOG_CHANNEL  = "stderr"
  LOG_LEVEL    = "error"
  QUEUE_CONNECTION = "sync"
  FILESYSTEM_DISK  = "local"
  PORT         = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source      = "quiniela_data"
  destination = "/var/www/html/database"
  initial_size = "1gb"
